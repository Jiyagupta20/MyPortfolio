<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jiya Gupta – Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --purple: #7B2FBE;
      --purple-mid: #8B35D6;
      --border-purple: #a855f7;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Outer purple border ── */
    .frame {
      position: relative;
      width: min(960px, 98vw);
      aspect-ratio: 16 / 9;
      border: 2.5px solid var(--border-purple);
      background: var(--black);
      overflow: hidden;
    }

    /* ── Ink splatter blobs ── */
    .ink {
      position: absolute;
      border-radius: 50%;
      filter: blur(0px);
      opacity: 0.85;
      background: #111;
    }
    .ink-1 {
      width: 22%; height: 55%;
      top: 18%; left: -5%;
      border-radius: 60% 40% 55% 45% / 45% 55% 45% 55%;
      background: #161616;
    }
    .ink-2 {
      width: 18%; height: 40%;
      top: 5%; left: 3%;
      border-radius: 40% 60% 65% 35% / 55% 45% 55% 45%;
      background: #121212;
    }
    .ink-3 {
      width: 12%; height: 30%;
      bottom: 8%; left: 8%;
      border-radius: 50% 50% 40% 60% / 60% 40% 60% 40%;
      background: #141414;
    }
    .ink-4 {
      width: 14%; height: 35%;
      top: 35%; left: 14%;
      border-radius: 45% 55% 60% 40% / 40% 60% 40% 60%;
      background: #0f0f0f;
    }

    /* ── Name top-left ── */
    .name {
      position: absolute;
      top: 6%;
      left: 3%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(16px, 2.2vw, 26px);
      letter-spacing: 0.08em;
      color: var(--white);
      z-index: 10;
    }

    /* ── Subtitle italic ── */
    .subtitle {
      position: absolute;
      top: 18%;
      left: 16%;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(14px, 2vw, 24px);
      color: var(--white);
      font-style: italic;
      font-weight: 700;
      letter-spacing: 0.04em;
      z-index: 10;
    }

    /* ── PORTFOLIO big text ── */
    .portfolio-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-52%, -46%);
      z-index: 5;
      white-space: nowrap;
      line-height: 1;
    }

    .portfolio-word {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(60px, 13.5vw, 155px);
      letter-spacing: 0.01em;
      color: var(--white);
      position: relative;
      display: inline-block;
    }

    /* The ripped-reveal section (FOLIO half) */
    .portfolio-word .reveal {
      position: relative;
      display: inline-block;
    }

    /* White layer */
    .reveal .white-layer {
      display: inline-block;
      color: var(--white);
      position: relative;
      z-index: 2;
    }

    /* Purple layer clipped below the rip */
    .reveal .purple-layer {
      position: absolute;
      top: 0; left: 0;
      color: var(--purple-mid);
      clip-path: polygon(0% 52%, 100% 38%, 100% 100%, 0% 100%);
      z-index: 3;
    }

    /* ── Ripped paper SVG overlay ── */
    .rip-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-52%, -46%);
      width: clamp(200px, 45vw, 520px);
      pointer-events: none;
      z-index: 6;
    }

    /* ── Tape pieces ── */
    .tape {
      position: absolute;
      background: rgba(130,130,130,0.55);
      border-radius: 2px;
      z-index: 8;
    }
    .tape-left {
      width: clamp(38px, 5vw, 65px);
      height: clamp(10px, 1.2vw, 16px);
      bottom: 31%;
      left: 12.5%;
      transform: rotate(-35deg);
    }
    .tape-right {
      width: clamp(38px, 5vw, 65px);
      height: clamp(10px, 1.2vw, 16px);
      top: 36%;
      right: 13%;
      transform: rotate(-28deg);
    }

    /* ── Cartoon avatar ── */
    .avatar {
      position: absolute;
      bottom: 10%;
      right: 2%;
      height: 60%;
      z-index: 9;
    }

    /* ── Bottom toolbar ── */
    .toolbar {
      position: absolute;
      bottom: 4%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(45,45,50,0.92);
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: clamp(6px, 1.2vw, 16px);
      padding: clamp(6px, 0.9vw, 10px) clamp(12px, 2vw, 22px);
      z-index: 15;
      backdrop-filter: blur(4px);
    }

    .tb-icon {
      width: clamp(16px, 2vw, 24px);
      height: clamp(16px, 2vw, 24px);
      stroke: rgba(255,255,255,0.75);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .tb-btn {
      background: #4f86f7;
      border-radius: 6px;
      padding: 4px 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tb-btn .tb-icon { stroke: #fff; }

    .tb-divider {
      width: 1px;
      height: clamp(16px, 2vw, 24px);
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    .tb-dot {
      width: 5px; height: 5px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="frame">

  <!-- Ink blobs -->
  <div class="ink ink-1"></div>
  <div class="ink ink-2"></div>
  <div class="ink ink-3"></div>
  <div class="ink ink-4"></div>

  <!-- Name -->
  <div class="name">JIYA GUPTA</div>

  <!-- Subtitle -->
  <div class="subtitle">UI/UX Designer</div>

  <!-- Main PORTFOLIO text -->
  <div class="portfolio-wrap">
    <span class="portfolio-word">
      PORT
      <span class="reveal">
        <span class="white-layer">FOLIO</span>
        <span class="purple-layer" aria-hidden="true">FOLIO</span>
      </span>
    </span>
  </div>

  <!-- SVG ripped paper tear line -->
  <svg class="rip-overlay" viewBox="0 0 520 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path
      d="M 0 75
         L 18 68  L 30 78  L 44 62  L 58 72  L 70 58  L 85 70
         L 100 55 L 115 68 L 128 52 L 142 66 L 155 50 L 168 63
         L 182 47 L 196 62 L 210 45 L 224 60 L 238 44 L 252 58
         L 266 42 L 280 56 L 295 40 L 308 54 L 322 38 L 336 52
         L 350 36 L 364 50 L 378 35 L 392 50 L 406 36 L 420 52
         L 434 38 L 448 54 L 462 40 L 476 56 L 490 42 L 505 58 L 520 44"
      stroke="white"
      stroke-width="2.2"
      stroke-linecap="round"
      fill="none"
      opacity="0.9"
    />
    <!-- torn paper fill below the rip -->
    <path
      d="M 0 75
         L 18 68  L 30 78  L 44 62  L 58 72  L 70 58  L 85 70
         L 100 55 L 115 68 L 128 52 L 142 66 L 155 50 L 168 63
         L 182 47 L 196 62 L 210 45 L 224 60 L 238 44 L 252 58
         L 266 42 L 280 56 L 295 40 L 308 54 L 322 38 L 336 52
         L 350 36 L 364 50 L 378 35 L 392 50 L 406 36 L 420 52
         L 434 38 L 448 54 L 462 40 L 476 56 L 490 42 L 505 58 L 520 44
         L 520 120 L 0 120 Z"
      fill="white"
      opacity="0.06"
    />
  </svg>

  <!-- Tape pieces -->
  <div class="tape tape-left"></div>
  <div class="tape tape-right"></div>

  <!-- Cartoon avatar SVG (inline recreation matching the design) -->
  <svg class="avatar" viewBox="0 0 180 320" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Body / top -->
    <ellipse cx="90" cy="260" rx="55" ry="55" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <!-- Floral top hint -->
    <ellipse cx="90" cy="255" rx="40" ry="42" fill="#1e1a2a"/>
    <circle cx="75" cy="248" r="4" fill="#2a2040" opacity="0.8"/>
    <circle cx="90" cy="243" r="3" fill="#2a2040" opacity="0.8"/>
    <circle cx="105" cy="250" r="4" fill="#2a2040" opacity="0.8"/>
    <!-- Neck -->
    <rect x="80" y="195" width="20" height="28" rx="8" fill="#e8c49a"/>
    <!-- Head -->
    <ellipse cx="90" cy="175" rx="48" ry="52" fill="#e8c49a"/>
    <!-- Hair – long dark -->
    <ellipse cx="90" cy="155" rx="50" ry="54" fill="#1a1008"/>
    <!-- Hair sides -->
    <path d="M 42 165 Q 28 220 38 290" stroke="#1a1008" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M 138 165 Q 152 220 142 290" stroke="#1a1008" stroke-width="22" stroke-linecap="round" fill="none"/>
    <!-- Face base over hair -->
    <ellipse cx="90" cy="182" rx="36" ry="40" fill="#e8c49a"/>
    <!-- Glasses frames -->
    <rect x="62" y="174" width="22" height="16" rx="6" stroke="#222" stroke-width="2.5" fill="rgba(200,220,255,0.15)"/>
    <rect x="94" y="174" width="22" height="16" rx="6" stroke="#222" stroke-width="2.5" fill="rgba(200,220,255,0.15)"/>
    <line x1="84" y1="182" x2="94" y2="182" stroke="#222" stroke-width="2"/>
    <line x1="62" y1="182" x2="55" y2="180" stroke="#222" stroke-width="2"/>
    <line x1="116" y1="182" x2="123" y2="180" stroke="#222" stroke-width="2"/>
    <!-- Eyes behind glasses -->
    <circle cx="73" cy="182" r="4" fill="#3a2010"/>
    <circle cx="105" cy="182" r="4" fill="#3a2010"/>
    <circle cx="74.5" cy="181" r="1.2" fill="white"/>
    <circle cx="106.5" cy="181" r="1.2" fill="white"/>
    <!-- Eyebrows -->
    <path d="M 63 171 Q 73 167 83 170" stroke="#2a1808" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M 95 170 Q 105 167 115 171" stroke="#2a1808" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Nose -->
    <path d="M 88 192 Q 86 200 90 202 Q 94 200 92 192" stroke="#c8986a" stroke-width="1.5" fill="none"/>
    <!-- Smile -->
    <path d="M 80 210 Q 90 218 100 210" stroke="#b07040" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Cheek blush -->
    <ellipse cx="65" cy="200" rx="8" ry="5" fill="#f0a090" opacity="0.35"/>
    <ellipse cx="115" cy="200" rx="8" ry="5" fill="#f0a090" opacity="0.35"/>
    <!-- Top of head hair -->
    <path d="M 50 168 Q 55 128 90 122 Q 125 128 130 168" fill="#1a1008"/>
    <!-- Hair strand detail -->
    <path d="M 90 122 Q 85 108 78 100" stroke="#1a1008" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M 90 122 Q 96 110 102 104" stroke="#1a1008" stroke-width="6" stroke-linecap="round" fill="none"/>
  </svg>

  <!-- Toolbar -->
  <div class="toolbar">
    <!-- Select arrow btn (blue) -->
    <div class="tb-btn">
      <svg class="tb-icon" viewBox="0 0 24 24"><path d="M5 3l14 9-7 2-3 7z" stroke="white" stroke-width="1.8" fill="none"/></svg>
    </div>
    <svg class="tb-icon" style="opacity:.5" viewBox="0 0 24 24"><path d="M5 3l14 9-7 2-3 7z"/></svg>
    <div class="tb-dot"></div>

    <!-- Frame/grid -->
    <svg class="tb-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
    <div class="tb-dot"></div>

    <!-- Rectangle -->
    <svg class="tb-icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
    <div class="tb-dot"></div>

    <!-- Pen/bezier -->
    <svg class="tb-icon" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    <div class="tb-dot"></div>

    <!-- Text -->
    <svg class="tb-icon" viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>

    <!-- Circle -->
    <svg class="tb-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>

    <!-- Components -->
    <svg class="tb-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="9" height="9" rx="1"/><rect x="13" y="2" width="9" height="9" rx="1"/><rect x="2" y="13" width="9" height="9" rx="1"/><rect x="13" y="13" width="9" height="9" rx="1"/></svg>

    <div class="tb-divider"></div>

    <!-- Pencil/scribble -->
    <svg class="tb-icon" viewBox="0 0 24 24"><path d="M3 17c2-2 4-3 6-1s4 1 6-1 4-2 6 0"/><path d="M3 12c2-2 4-3 6-1s4 1 6-1 4-2 6 0"/></svg>

    <!-- Hand/cursor -->
    <svg class="tb-icon" viewBox="0 0 24 24"><path d="M18 11V8a2 2 0 00-4 0v3"/><path d="M14 8V6a2 2 0 00-4 0v5"/><path d="M10 6.5A2 2 0 006 8v7l2 3h8l2-3v-6a2 2 0 00-4 0"/></svg>

    <!-- Code brackets -->
    <svg class="tb-icon" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  </div>

</div>

</body>
</html>
