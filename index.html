<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1366" />
  <title>Jiya Gupta – Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Kalam:wght@300;400;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      width: 1366px;
      height: 768px;
      overflow: hidden;
      position: relative;
      font-family: sans-serif;
    }

    /* ── ink-splatter background blobs ── */
    .bg-blob {
      position: absolute;
      border-radius: 50%;
      background: #1a1a1a;
      filter: blur(60px);
      pointer-events: none;
    }

    .blob1 {
      width: 520px;
      height: 420px;
      left: -80px;
      top: 120px;
      border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
    }

    .blob2 {
      width: 340px;
      height: 300px;
      left: 60px;
      bottom: 60px;
      border-radius: 40% 60% 45% 55% / 55% 45% 60% 40%;
    }

    .blob3 {
      width: 280px;
      height: 260px;
      right: 260px;
      top: 80px;
      border-radius: 55% 45% 40% 60% / 45% 55% 60% 40%;
      background: #161616;
    }

    /* ── top-left name ── */
    .name {
      position: absolute;
      top: 28px;
      left: 36px;
      width: 231.72px;
      height: 70px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: #fff;
      letter-spacing: 1px;
    }

    /* ── subtitle ── */
    .subtitle {
      position: absolute;
      top: 80px;
      left: 200px;
      z-index: 10;
      font-family: 'Kalam', cursive;
      font-size: 34px;
      font-weight: 400;
      color: #fff;
      letter-spacing: 1px;
      font-style: italic;
    }

    /* ── giant PORTFOLIO word ── */
    .portfolio-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 1116.82px;
      height: 476.44px;
      transform: translate(-50%, -50%);
    }

    /* white letters: P O R T  (left side) */
    .word-left {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 300px;
      line-height: 1;
      color: #fff;
      letter-spacing: -6px;
      position: absolute;
      top: 0;
      left: 0;
      white-space: nowrap;
      user-select: none;
    }


    /* ── torn-paper purple reveal ── */
    .torn-wrap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* purple text underneath */
    .word-purple {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 300px;
      line-height: 1;
      color: #7b2fff;
      letter-spacing: -6px;
      position: absolute;
      top: 0;
      left: 0;
      white-space: nowrap;
      user-select: none;
    }

    /* torn paper overlay shape – white paper being peeled */
    .torn-paper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* ── eraser / pen objects ── */

    /* ── avatar illustration ── */

    /* ── bottom toolbar ── */
    .toolbar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 4px;
      background: #2a2a2a;
      border-radius: 14px;
      padding: 10px 18px;
      z-index: 20;
    }

    .toolbar-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      color: #ccc;
      font-size: 16px;
      transition: background 0.15s;
    }

    .toolbar-btn:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .toolbar-btn.active {
      background: #4f8ef7;
      color: #fff;
    }

    .toolbar-divider {
      width: 1px;
      height: 28px;
      background: #444;
      margin: 0 6px;
    }

    .toolbar-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.7;
    }

    /* purple border outline of page */
    body::before {
      content: '';
      position: absolute;
      inset: 2px;
      border: 2px solid #7b2fff;
      border-radius: 4px;
      pointer-events: none;
      z-index: 30;
    }
  </style>
</head>
