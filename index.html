<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1366" />
  <title>Jiya Gupta – Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Kalam:wght@300;400;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      width: 1366px;
      height: 768px;
      overflow: hidden;
      position: relative;
      font-family: sans-serif;
    }

    /* ── ink-splatter background blobs ── */
    .bg-blob {
      position: absolute;
      border-radius: 50%;
      background: #1a1a1a;
      filter: blur(60px);
      pointer-events: none;
    }

    .blob1 {
      width: 520px;
      height: 420px;
      left: -80px;
      top: 120px;
      border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
    }

    .blob2 {
      width: 340px;
      height: 300px;
      left: 60px;
      bottom: 60px;
      border-radius: 40% 60% 45% 55% / 55% 45% 60% 40%;
    }

    .blob3 {
      width: 280px;
      height: 260px;
      right: 260px;
      top: 80px;
      border-radius: 55% 45% 40% 60% / 45% 55% 60% 40%;
      background: #161616;
    }

    /* ── top-left name ── */
    .name {
      position: absolute;
      top: 28px;
      left: 36px;
      width: 231.72px;
      height: 70px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: #fff;
      letter-spacing: 1px;
    }

    /* ── subtitle ── */
    .subtitle {
      position: absolute;
      top: 80px;
      left: 200px;
      z-index: 10;
      font-family: 'Kalam', cursive;
      font-size: 34px;
      font-weight: 400;
      color: #fff;
      letter-spacing: 1px;
      font-style: italic;
    }

    /* ── giant PORTFOLIO word ── */
    .portfolio-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 1116.82px;
      height: 476.44px;
      transform: translate(-50%, -50%);
    }

    /* white letters: P O R T  (left side) */
    .word-left {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 300px;
      line-height: 1;
      color: #fff;
      letter-spacing: -6px;
      position: absolute;
      top: 0;
      left: 0;
      white-space: nowrap;
      user-select: none;
    }


    /* ── torn-paper purple reveal ── */
    .torn-wrap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* purple text underneath */
    .word-purple {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 300px;
      line-height: 1;
      color: #7b2fff;
      letter-spacing: -6px;
      position: absolute;
      top: 0;
      left: 0;
      white-space: nowrap;
      user-select: none;
    }

    /* torn paper overlay shape – white paper being peeled */
    .torn-paper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* ── eraser / pen objects ── */

    /* ── avatar illustration ── */

    /* ── bottom toolbar ── */
    .toolbar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 4px;
      background: #2a2a2a;
      border-radius: 14px;
      padding: 10px 18px;
      z-index: 20;
    }

    .toolbar-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      color: #ccc;
      font-size: 16px;
      transition: background 0.15s;
    }

    .toolbar-btn:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .toolbar-btn.active {
      background: #4f8ef7;
      color: #fff;
    }

    .toolbar-divider {
      width: 1px;
      height: 28px;
      background: #444;
      margin: 0 6px;
    }

    .toolbar-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.7;
    }

    /* purple border outline of page */
    body::before {
      content: '';
      position: absolute;
      inset: 2px;
      border: 2px solid #7b2fff;
      border-radius: 4px;
      pointer-events: none;
      z-index: 30;
    }
  </style>
</head>

<body>

  <!-- background blobs -->
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <!-- name top left -->
  <div class="name">JIYA GUPTA</div>

  <!-- subtitle -->
  <div class="subtitle">UI/UX Designer</div>

  <!-- PORTFOLIO giant text -->
  <div class="portfolio-wrap">

    <!-- white "PORT" -->
    <div class="word-left">PORT</div>

    <!-- torn purple reveal area -->
    <div class="torn-wrap">
      <!-- purple FOLIO behind -->
      <div class="word-purple">FOLIO</div>

      <!-- SVG torn paper mask on top -->
      <svg class="torn-paper" viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <!-- White paper sheet with ragged torn bottom edge being peeled away -->
        <defs>
          <filter id="shadow" x="-5%" y="-5%" width="115%" height="130%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.7)" />
          </filter>
        </defs>
        <!-- Main paper - top portion still covering purple -->
        <path d="
            M 0 0
            L 680 0
            L 680 155
            C 640 148, 600 162, 560 150
            C 520 138, 490 158, 455 144
            C 420 130, 395 152, 360 140
            C 325 128, 300 150, 265 136
            C 230 122, 205 148, 170 134
            C 135 120, 110 142, 75 128
            C 50 118, 25 136, 0 122
            Z
          " fill="#fff" filter="url(#shadow)" />
        <!-- Torn lower flap curling away -->
        <path d="
            M 0 200
            C 25 192, 50 210, 75 196
            C 110 180, 135 200, 170 186
            C 205 172, 228 195, 265 178
            C 300 162, 323 184, 360 170
            C 395 156, 418 178, 455 164
            C 490 150, 518 174, 560 158
            C 600 143, 638 166, 680 155
            L 680 290
            L 0 290
            Z
          " fill="#fff" opacity="0.92" filter="url(#shadow)" />
        <!-- Ragged tear white strip connecting them – the actual torn edge highlight -->
        <path d="
            M 0 122
            C 25 136, 50 118, 75 128
            C 110 142, 135 120, 170 134
            C 205 148, 230 122, 265 136
            C 300 150, 325 128, 360 140
            C 395 152, 420 130, 455 144
            C 490 158, 520 138, 560 150
            C 600 162, 640 148, 680 155
            C 638 166, 600 143, 560 158
            C 518 174, 490 150, 455 164
            C 418 178, 395 156, 360 170
            C 323 184, 300 162, 265 178
            C 228 195, 205 172, 170 186
            C 135 200, 110 180, 75 196
            C 50 210, 25 192, 0 200
            Z
          " fill="#fff" opacity="0.15" />
      </svg>
    </div>


  </div>



  <!-- toolbar -->
  <div class="toolbar">
    <!-- cursor/select (active) -->
    <div class="toolbar-btn active toolbar-icon">
      <svg viewBox="0 0 24 24">
        <path d="M5 3l14 9-7 2-3 7z" stroke="currentColor" stroke-width="1.8" fill="none" />
      </svg>
    </div>
    <div class="toolbar-btn toolbar-icon">
      <svg viewBox="0 0 24 24">
        <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z" stroke="currentColor" stroke-width="1.5"
          fill="none" />
      </svg>
    </div>
    <!-- rectangle -->
    <div class="toolbar-btn toolbar-icon">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="5" width="18" height="14" rx="1" stroke="currentColor" stroke-width="1.8" />
      </svg>
    </div>
    <!-- pen/bezier -->
    <div class="toolbar-btn toolbar-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 19l-7-7 7-7 7 7z" stroke="currentColor" stroke-width="1.8" />
        <circle cx="12" cy="12" r="2" fill="currentColor" />
      </svg>
    </div>
    <!-- T text -->
    <div class="toolbar-btn toolbar-icon">
      <svg viewBox="0 0 24 24">
        <path d="M4 6h16M12 6v13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </div>
    <!-- circle -->
    <div class="toolbar-btn toolbar-icon">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8" />
      </svg>
    </div>
    <!-- components/grid-plus -->
    <div class="toolbar-btn toolbar-icon">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="none" />
        <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="none" />
        <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="none" />
        <path d="M17.5 14v7M14 17.5h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
      </svg>
    </div>

    <div class="toolbar-divider"></div>

    <!-- pencil/draw -->
    <div class="toolbar-btn toolbar-icon">
      <svg viewBox="0 0 24 24">
        <path d="M4 20l4-1L20 7l-3-3L5 16z" stroke="currentColor" stroke-width="1.6" fill="none" />
        <path d="M17 4l3 3" stroke="currentColor" stroke-width="1.6" />
      </svg>
    </div>
    <!-- frame/artboard -->
    <div class="toolbar-btn toolbar-icon">
      <svg viewBox="0 0 24 24">
        <path d="M3 8h18M3 16h18M8 3v18M16 3v18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
      </svg>
    </div>
    <!-- code embed -->
    <div class="toolbar-btn toolbar-icon">
      <svg viewBox="0 0 24 24">
        <path d="M8 6L3 12l5 6M16 6l5 6-5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
          stroke-linejoin="round" fill="none" />
      </svg>
    </div>
  </div>

</body>

</html>
